<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Multiverse Girls Opalium</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      
      #unity-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      #unity-canvas {
        width: 100%;
        height: 100%;
        max-width: 1080px;
        object-fit: contain;
      }
      
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }
      
      #unity-footer {
        position: absolute;
        bottom: 10px;
        right: 10px;
        z-index: 10;
      }
      
      #unity-fullscreen-button {
        width: 40px;
        height: 40px;
        background: url('TemplateData/fullscreen-button.png') no-repeat center;
        background-size: contain;
        cursor: pointer;
        opacity: 0.7;
      }
      
      #unity-fullscreen-button:hover {
        opacity: 1;
      }
      
      /* На телефонах скрываем футер и убираем ограничение ширины */
      @media (max-width: 768px) {
        #unity-footer {
          display: none;
        }
        #unity-canvas {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button" title="На весь экран"></div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Opl7.loader.js";
      var config = {
        dataUrl: buildUrl + "/Opl7.data",
        frameworkUrl: buildUrl + "/Opl7.framework.js",
        codeUrl: buildUrl + "/Opl7.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Koriem",
        productName: "Multiverse Girls Opalium",
        productVersion: "1.0.2",
        showBanner: unityShowBanner,
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                if (fullscreenButton) {
                  fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                  };
                }
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);
    </script>
  </body>
</html>
